<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campistry Snacks — Selling Console</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{--snacks:#22C55E;--snacks-dark:#16A34A;--snacks-50:#F0FDF4;--snacks-100:#DCFCE7;--bg:#0F172A;--bg-card:#1E293B;--bg-card-hover:#334155;--border:#334155;--text:#F8FAFC;--text-dim:#94A3B8;--text-muted:#64748B;--red:#EF4444;--amber:#F59E0B;--radius:10px;--radius-sm:6px;--radius-lg:14px;--radius-full:999px;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* === LAYOUT: full viewport, 3 columns === */
.app{display:grid;grid-template-columns:280px 1fr 340px;grid-template-rows:auto 1fr;height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;background:rgba(15,23,42,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{display:flex;align-items:center;gap:6px;font-weight:700;font-size:1rem}
.topbar-logo-icon{width:28px;height:28px;background:var(--snacks);border-radius:7px;display:flex;align-items:center;justify-content:center}
.topbar-logo span{color:var(--snacks)}
.topbar-badge{padding:3px 10px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--snacks);color:white;border-radius:var(--radius-full)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-time{font-size:.8rem;color:var(--text-dim);font-variant-numeric:tabular-nums}
.topbar-link{font-size:.75rem;color:var(--text-muted);transition:color .15s}.topbar-link:hover{color:var(--snacks)}

/* === LEFT: Camper Selector === */
.camper-panel{grid-row:2;display:flex;flex-direction:column;border-right:1px solid var(--border);background:rgba(30,41,59,.5)}
.camper-search{padding:.75rem;border-bottom:1px solid var(--border)}
.camper-search input{width:100%;padding:.6rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.875rem;outline:none;transition:border-color .15s}
.camper-search input:focus{border-color:var(--snacks)}
.camper-search input::placeholder{color:var(--text-muted)}
.camper-list{flex:1;overflow-y:auto;padding:.5rem}
.camper-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;border-radius:var(--radius);cursor:pointer;transition:all .12s;margin-bottom:2px}
.camper-item:hover{background:var(--bg-card-hover)}
.camper-item.selected{background:var(--snacks);color:white}
.camper-item.selected .camper-meta{color:rgba(255,255,255,.7)}
.camper-item.selected .camper-balance{color:white}
.camper-item.limit-hit{opacity:.5}
.camper-avatar{width:36px;height:36px;border-radius:var(--radius-full);background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--snacks);flex-shrink:0}
.camper-item.selected .camper-avatar{background:rgba(255,255,255,.2);color:white}
.camper-info{flex:1;min-width:0}
.camper-name{font-size:.8125rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.camper-meta{font-size:.65rem;color:var(--text-muted)}
.camper-balance{font-size:.875rem;font-weight:700;color:var(--snacks);white-space:nowrap}
.camper-balance.low{color:var(--amber)}.camper-balance.empty{color:var(--red)}

/* === CENTER: Item Grid === */
.items-panel{grid-row:2;display:flex;flex-direction:column;overflow:hidden}
.items-toolbar{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.items-toolbar input{flex:1;padding:.5rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.8125rem;outline:none}
.items-toolbar input:focus{border-color:var(--snacks)}
.cat-btn{padding:.4rem .75rem;border-radius:var(--radius-full);font-size:.7rem;font-weight:600;background:var(--bg-card);color:var(--text-dim);border:1px solid transparent;transition:all .12s}
.cat-btn:hover{background:var(--bg-card-hover);color:var(--text)}.cat-btn.active{background:var(--snacks);color:white}

.items-scroll{flex:1;overflow-y:auto;padding:1rem}
.section-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.6rem;display:flex;align-items:center;gap:5px}

/* Quick Push grid — popularity scaled */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem;margin-bottom:1.5rem}
.item-tile{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);padding:.65rem .5rem;text-align:center;cursor:pointer;transition:all .15s var(--ease);position:relative;user-select:none}
.item-tile:hover{border-color:var(--snacks);background:var(--bg-card-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,197,94,.15)}
.item-tile:active{transform:scale(.95)}
.item-tile.out{opacity:.25;pointer-events:none}
/* Popularity tiers */
.item-tile.hot{grid-column:span 2;grid-row:span 2;padding:1rem;border-color:rgba(34,197,94,.3);background:linear-gradient(135deg,var(--bg-card) 60%,rgba(34,197,94,.08))}
.item-tile.hot .tile-emoji{font-size:3rem}.item-tile.hot .tile-name{font-size:.9rem}.item-tile.hot .tile-price{font-size:.85rem}
.item-tile.warm{grid-column:span 2;padding:.85rem;border-color:rgba(34,197,94,.15)}
.item-tile.warm .tile-emoji{font-size:2.25rem}.item-tile.warm .tile-name{font-size:.8125rem}
.tile-emoji{font-size:1.6rem;margin-bottom:.2rem;transition:transform .15s}.item-tile:hover .tile-emoji{transform:scale(1.12)}
.tile-name{font-size:.7rem;font-weight:600;line-height:1.2;margin-bottom:.1rem}
.tile-price{font-size:.65rem;color:var(--snacks);font-weight:700}
.tile-stock{font-size:.55rem;color:var(--text-muted);margin-top:.1rem}
.tile-rank{position:absolute;top:4px;right:4px;background:var(--snacks);color:white;font-size:.5rem;font-weight:800;padding:1px 5px;border-radius:var(--radius-full);line-height:1.4}

/* All items (smaller) */
.all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.4rem}
.all-grid .item-tile{padding:.5rem .35rem}.all-grid .tile-emoji{font-size:1.35rem;margin-bottom:.1rem}.all-grid .tile-name{font-size:.65rem}.all-grid .tile-price{font-size:.6rem}

/* === RIGHT: Cart === */
.cart-panel{grid-row:2;display:flex;flex-direction:column;border-left:1px solid var(--border);background:rgba(30,41,59,.5)}
.cart-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-header h3{font-size:1rem;font-weight:600}.cart-clear{font-size:.7rem;color:var(--text-muted);transition:color .15s}.cart-clear:hover{color:var(--red)}
.cart-camper-bar{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.cart-camper-name{font-size:.8125rem;font-weight:600;flex:1}
.cart-camper-bal{font-size:.8125rem;font-weight:700;color:var(--snacks)}
.cart-camper-empty{font-size:.75rem;color:var(--text-muted);font-style:italic}
.cart-body{flex:1;overflow-y:auto;padding:.75rem 1rem}
.cart-empty{text-align:center;padding:2.5rem 1rem;color:var(--text-muted);font-size:.8rem}
.cart-line{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.8125rem}.cart-line:last-child{border-bottom:none}
.cart-line-info{flex:1}.cart-line-name{font-weight:600}.cart-line-sub{font-size:.7rem;color:var(--text-muted)}
.cart-line-qty{display:flex;align-items:center;gap:3px}
.cart-line-qty button{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;transition:all .1s}
.cart-line-qty button:hover{border-color:var(--snacks);color:var(--snacks)}
.cart-line-qty span{min-width:18px;text-align:center;font-weight:700;font-size:.8rem}
.cart-line-total{font-weight:700;min-width:44px;text-align:right}
.cart-footer{border-top:1px solid var(--border);padding:1rem 1.25rem}
.cart-total-row{display:flex;justify-content:space-between;font-size:1.15rem;font-weight:700;margin-bottom:.75rem}
.cart-total-row .val{color:var(--snacks)}
.cart-remaining{font-size:.7rem;color:var(--text-muted);margin-bottom:.75rem;text-align:right}
.charge-btn{width:100%;padding:.85rem;font-size:1rem;font-weight:700;color:white;background:var(--snacks);border-radius:var(--radius);transition:all .15s;letter-spacing:.01em}
.charge-btn:hover:not(:disabled){background:var(--snacks-dark);box-shadow:0 4px 20px rgba(34,197,94,.35)}
.charge-btn:disabled{opacity:.35;cursor:not-allowed}
.charge-btn:active:not(:disabled){transform:scale(.98)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--snacks);color:white;padding:.7rem 1.5rem;border-radius:var(--radius-full);font-size:.8rem;font-weight:600;box-shadow:0 8px 24px rgba(34,197,94,.4);z-index:300;opacity:0;transition:all .3s var(--ease);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.err{background:var(--red)}

/* Success flash */
@keyframes successFlash{0%{background:rgba(34,197,94,.15)}100%{background:transparent}}
.flash{animation:successFlash .6s var(--ease)}

/* Responsive */
@media(max-width:900px){.app{grid-template-columns:1fr 300px}.camper-panel{display:none}}
@media(max-width:600px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}.cart-panel{max-height:40vh;border-left:none;border-top:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
<div class="topbar-left">
<div class="topbar-logo"><div class="topbar-logo-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg></div> Campistry <span>Snacks</span></div>
<div class="topbar-badge">Selling Console</div>
</div>
<div class="topbar-right">
<span class="topbar-time" id="clock"></span>
<a href="campistry_snacks.html" class="topbar-link">Manager View →</a>
</div>
</div>

<!-- LEFT: Camper Selector -->
<div class="camper-panel">
<div class="camper-search"><input type="text" placeholder="Search camper…" id="camperSearch" oninput="renderCampers()" autofocus></div>
<div class="camper-list" id="camperList"></div>
</div>

<!-- CENTER: Items -->
<div class="items-panel">
<div class="items-toolbar">
<input type="text" placeholder="Search items…" id="itemSearch" oninput="renderItems()">
<button class="cat-btn active" onclick="setCat(this,'all')">All</button>
<button class="cat-btn" onclick="setCat(this,'drink')">Drinks</button>
<button class="cat-btn" onclick="setCat(this,'snack')">Snacks</button>
<button class="cat-btn" onclick="setCat(this,'treat')">Treats</button>
</div>
<div class="items-scroll">
<div class="section-label">⚡ Quick Push — Top Sellers</div>
<div class="quick-grid" id="quickGrid"></div>
<div class="section-label">☰ All Items</div>
<div class="all-grid" id="allGrid"></div>
</div>
</div>

<!-- RIGHT: Cart -->
<div class="cart-panel">
<div class="cart-header"><h3>Cart</h3><button class="cart-clear" onclick="clearCart()">Clear All</button></div>
<div class="cart-camper-bar" id="cartCamperBar"><span class="cart-camper-empty">← Select a camper</span></div>
<div class="cart-body" id="cartBody"><div class="cart-empty">Tap items to start</div></div>
<div class="cart-footer">
<div class="cart-total-row"><span>Total</span><span class="val" id="cartTotal">$0.00</span></div>
<div class="cart-remaining" id="cartRemaining"></div>
<button class="charge-btn" id="chargeBtn" disabled onclick="charge()">Charge</button>
</div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

const C=[
{id:1,name:'Ethan Goldberg',div:'Senior',bunk:'Bunk 18',bal:45,limit:10,spent:3.5},
{id:2,name:'Maya Rosenberg',div:'Senior',bunk:'Bunk 19',bal:32.5,limit:8,spent:8},
{id:3,name:'Jake Cohen',div:'Junior',bunk:'Bunk 7',bal:60,limit:12,spent:0},
{id:4,name:'Lily Schwartz',div:'Junior',bunk:'Bunk 8',bal:5.25,limit:8,spent:6.5},
{id:5,name:'Noah Friedman',div:'Middler',bunk:'Bunk 12',bal:28,limit:10,spent:2},
{id:6,name:'Ava Klein',div:'Middler',bunk:'Bunk 13',bal:0,limit:8,spent:0},
{id:7,name:'Sam Levine',div:'Senior',bunk:'Bunk 20',bal:15.75,limit:10,spent:4.5},
{id:8,name:'Zoe Katz',div:'Junior',bunk:'Bunk 9',bal:42,limit:10,spent:1.5},
{id:9,name:'Ben Rosen',div:'Senior',bunk:'Bunk 21',bal:20,limit:10,spent:0},
{id:10,name:'Sophie Weiss',div:'Middler',bunk:'Bunk 14',bal:35,limit:10,spent:5}
];
const I=[
{id:1,name:'Water Bottle',cat:'drink',emoji:'💧',price:1.5,stock:120,sold:18,total:312},
{id:2,name:'Gatorade',cat:'drink',emoji:'🥤',price:2.5,stock:64,sold:12,total:248},
{id:3,name:'Chips',cat:'snack',emoji:'🍿',price:2,stock:45,sold:22,total:445},
{id:4,name:'Granola Bar',cat:'snack',emoji:'🥜',price:1.75,stock:80,sold:8,total:89},
{id:5,name:'Ice Pop',cat:'treat',emoji:'🧊',price:1,stock:200,sold:35,total:780},
{id:6,name:'Candy Bar',cat:'treat',emoji:'🍫',price:2,stock:8,sold:14,total:220},
{id:7,name:'Pretzel',cat:'snack',emoji:'🥨',price:1.5,stock:55,sold:10,total:155},
{id:8,name:'Juice Box',cat:'drink',emoji:'🧃',price:1.75,stock:0,sold:30,total:410},
{id:9,name:'Cookie',cat:'treat',emoji:'🍪',price:1.5,stock:32,sold:16,total:290},
{id:10,name:'Fruit Cup',cat:'snack',emoji:'🍇',price:3,stock:40,sold:5,total:62}
];

let sel=null,cart=[],cat='all';

// Clock
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit',second:'2-digit'})}
setInterval(tick,1000);tick();

// === CAMPERS ===
window.renderCampers=function(){
const q=(document.getElementById('camperSearch').value||'').toLowerCase();
const el=document.getElementById('camperList');
const list=C.filter(c=>c.name.toLowerCase().includes(q));
el.innerHTML=list.map(c=>{
const rem=c.limit-c.spent;const cls=(c.bal<=0?'empty':c.bal<=5?'low':'');const limitHit=rem<=0&&c.bal>0;
const initials=c.name.split(' ').map(w=>w[0]).join('');
return '<div class="camper-item'+(sel===c.id?' selected':'')+(limitHit?' limit-hit':'')+'" onclick="pickCamper('+c.id+')"><div class="camper-avatar">'+initials+'</div><div class="camper-info"><div class="camper-name">'+esc(c.name)+'</div><div class="camper-meta">'+c.div+' · '+c.bunk+(limitHit?' · Limit hit':'')+'</div></div><div class="camper-balance '+cls+'">$'+c.bal.toFixed(2)+'</div></div>'
}).join('');
};

window.pickCamper=function(id){
sel=id;renderCampers();updateCamperBar();updateChargeBtn();
};

function updateCamperBar(){
const bar=document.getElementById('cartCamperBar');
if(!sel){bar.innerHTML='<span class="cart-camper-empty">← Select a camper</span>';return}
const c=C.find(x=>x.id===sel);
bar.innerHTML='<div class="camper-avatar" style="width:28px;height:28px;font-size:.6rem;background:var(--snacks);color:white">'+c.name.split(' ').map(w=>w[0]).join('')+'</div><div class="cart-camper-name">'+esc(c.name)+'</div><div class="cart-camper-bal">$'+c.bal.toFixed(2)+'</div>';
}

// === ITEMS ===
window.setCat=function(btn,c){cat=c;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderItems()};

window.renderItems=function(){
const q=(document.getElementById('itemSearch').value||'').toLowerCase();
const fil=I.filter(i=>(cat==='all'||i.cat===cat)&&i.name.toLowerCase().includes(q));
const sorted=[...fil].sort((a,b)=>b.total-a.total);
const maxT=Math.max(...I.map(i=>i.total),1);

// Quick push: top 5 in stock
const quick=sorted.filter(i=>i.stock>0).slice(0,5);
document.getElementById('quickGrid').innerHTML=quick.map((i,idx)=>{
let tier='';if(idx===0)tier='hot';else if(i.total/maxT>.4)tier='warm';
const rank=idx<3?'<div class="tile-rank">🔥 #'+(idx+1)+'</div>':'';
return '<div class="item-tile '+tier+(i.stock===0?' out':'')+'" onclick="addItem('+i.id+')">'+rank+'<div class="tile-emoji">'+i.emoji+'</div><div class="tile-name">'+esc(i.name)+'</div><div class="tile-price">$'+i.price.toFixed(2)+'</div><div class="tile-stock">'+(i.stock===0?'OUT':i.stock+' left')+'</div></div>'
}).join('');

// All
document.getElementById('allGrid').innerHTML=sorted.map(i=>'<div class="item-tile '+(i.stock===0?'out':'')+'" onclick="addItem('+i.id+')"><div class="tile-emoji">'+i.emoji+'</div><div class="tile-name">'+esc(i.name)+'</div><div class="tile-price">$'+i.price.toFixed(2)+'</div></div>').join('');
};

window.addItem=function(id){
const item=I.find(i=>i.id===id);if(!item||item.stock===0)return;
const ex=cart.find(c=>c.id===id);
if(ex){if(ex.qty>=item.stock)return;ex.qty++}else cart.push({id,qty:1});
renderCart();
};

// === CART ===
window.clearCart=function(){cart=[];renderCart()};
window.changeQty=function(id,d){const ci=cart.find(c=>c.id===id);if(!ci)return;ci.qty+=d;if(ci.qty<=0)cart=cart.filter(c=>c.id!==id);renderCart()};

function renderCart(){
const body=document.getElementById('cartBody'),totalEl=document.getElementById('cartTotal'),remEl=document.getElementById('cartRemaining');
if(!cart.length){body.innerHTML='<div class="cart-empty">Tap items to start</div>';totalEl.textContent='$0.00';remEl.textContent='';updateChargeBtn();return}
let total=0;
body.innerHTML=cart.map(ci=>{const item=I.find(i=>i.id===ci.id);const lt=item.price*ci.qty;total+=lt;
return '<div class="cart-line"><div class="cart-line-info"><div class="cart-line-name">'+item.emoji+' '+esc(item.name)+'</div><div class="cart-line-sub">$'+item.price.toFixed(2)+' ea</div></div><div class="cart-line-qty"><button onclick="changeQty('+ci.id+',-1)">−</button><span>'+ci.qty+'</span><button onclick="changeQty('+ci.id+',1)">+</button></div><div class="cart-line-total">$'+lt.toFixed(2)+'</div></div>'
}).join('');
totalEl.textContent='$'+total.toFixed(2);
if(sel){const c=C.find(x=>x.id===sel);const rem=c.limit-c.spent;remEl.textContent='Daily remaining: $'+Math.max(rem,0).toFixed(2)+' · Balance: $'+c.bal.toFixed(2)}
updateChargeBtn();
}

function updateChargeBtn(){
const btn=document.getElementById('chargeBtn');
const total=cart.reduce((s,ci)=>{const item=I.find(i=>i.id===ci.id);return s+item.price*ci.qty},0);
if(!sel||!cart.length||total===0){btn.disabled=true;btn.textContent='Charge';return}
const c=C.find(x=>x.id===sel);
btn.disabled=false;
btn.textContent='Charge $'+total.toFixed(2)+' → '+c.name.split(' ')[0];
}

// === CHARGE ===
window.charge=function(){
if(!sel||!cart.length)return;
const c=C.find(x=>x.id===sel);
const total=cart.reduce((s,ci)=>{const item=I.find(i=>i.id===ci.id);return s+item.price*ci.qty},0);
const rem=c.limit-c.spent;
if(total>rem){toast('Exceeds daily limit ($'+rem.toFixed(2)+' left)',true);return}
if(total>c.bal){toast('Insufficient balance ($'+c.bal.toFixed(2)+')',true);return}

// Process
c.bal-=total;c.spent+=total;
cart.forEach(ci=>{const item=I.find(i=>i.id===ci.id);item.stock-=ci.qty;item.sold+=ci.qty;item.total+=ci.qty});
cart=[];

// Flash success
document.querySelector('.cart-panel').classList.add('flash');
setTimeout(()=>document.querySelector('.cart-panel').classList.remove('flash'),600);

toast('✓ $'+total.toFixed(2)+' charged to '+c.name);
sel=null;
renderCampers();renderItems();renderCart();updateCamperBar();
document.getElementById('camperSearch').value='';
document.getElementById('camperSearch').focus();
};

function toast(msg,err){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(err?' err':'');setTimeout(()=>el.className='toast',2200)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Boot
renderCampers();renderItems();renderCart();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campistry Snacks — Selling Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="campistry_snacks_pos.css">
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
<div class="topbar-left">
<img src="Snacks_clean.png" alt="Campistry Snacks" class="topbar-snacks-logo">
<div class="topbar-badge">Selling Console</div>
<div class="topbar-divider"></div>
<a href="campistry_me.html" class="topbar-app-link" title="Me"><img src="Me_clean.png" alt="Me"></a>
<a href="flow.html" class="topbar-app-link" title="Flow"><img src="Flow_clean.png" alt="Flow"></a>
<a href="campistry_go.html" class="topbar-app-link" title="Go"><img src="Go_clean.png" alt="Go"></a>
<a href="campistry_health.html" class="topbar-app-link" title="Health"><img src="Health_clean.png" alt="Health"></a>
<a href="campistry_link_admin.html" class="topbar-app-link" title="Link"><img src="Link_clean.png" alt="Link"></a>
</div>
<div class="topbar-right">
<span class="topbar-time" id="clock"></span>
<a href="campistry_snacks.html" class="topbar-link">Manager View →</a>
</div>
</div>

<!-- LEFT: Camper Selector -->
<div class="camper-panel">
<div class="camper-search"><input type="text" placeholder="Search camper…" id="camperSearch" oninput="renderCampers()" autofocus></div>
<div class="camper-list" id="camperList"></div>
</div>

<!-- CENTER: Items -->
<div class="items-panel">
<div class="items-toolbar">
<input type="text" placeholder="Search items…" id="itemSearch" oninput="renderItems()">
<button class="cat-btn active" onclick="setCat(this,'all')">All</button>
<button class="cat-btn" onclick="setCat(this,'drink')">Drinks</button>
<button class="cat-btn" onclick="setCat(this,'snack')">Snacks</button>
<button class="cat-btn" onclick="setCat(this,'treat')">Treats</button>
</div>
<div class="items-scroll">
<div class="section-label">⚡ Quick Push — Top Sellers</div>
<div class="quick-grid" id="quickGrid"></div>
<div class="section-label">☰ All Items</div>
<div class="all-grid" id="allGrid"></div>
</div>
</div>

<!-- RIGHT: Cart -->
<div class="cart-panel">
<div class="cart-header"><h3>Cart</h3><button class="cart-clear" onclick="clearCart()">Clear All</button></div>
<div class="cart-camper-bar" id="cartCamperBar"><span class="cart-camper-empty">← Select a camper</span></div>
<div class="cart-body" id="cartBody"><div class="cart-empty">Tap items to start</div></div>
<div class="cart-footer">
<div class="cart-total-row"><span>Total</span><span class="val" id="cartTotal">$0.00</span></div>
<div class="cart-remaining" id="cartRemaining"></div>
<button class="charge-btn" id="chargeBtn" disabled onclick="charge()">Charge</button>
</div>
</div>

</div>
<div class="toast" id="toast"></div>

<script src="campistry_snacks_pos.js"></script>
</body>
</html>

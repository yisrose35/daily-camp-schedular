<!DOCTYPE html>
<html lang="en" data-product="link">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tips — Campistry Link</title>
<link rel="icon" type="image/png" href="Campistry_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="campistry-unified.css">
<link rel="stylesheet" href="campistry_link.css">
<style>
    body { display: flex; justify-content: center; padding: 0; }
    .staff-wrap { width: 100%; max-width: 460px; min-height: 100vh; padding: 28px 18px 60px; }
    .staff-topbar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 6px 0 22px; }
    .staff-topbar img { height: 30px; }
    .staff-topbar span { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--link-color); }

    /* Reuse .lk-hero for the balance banner, with a compact staff-specific variant */
    .staff-hero { text-align: center; padding: 34px 28px 30px; }
    .staff-hero-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.75; margin-bottom: 10px; }
    .staff-hero-amt { font-family: var(--font-display); font-size: 3.1rem; font-weight: 700; line-height: 1; letter-spacing: -0.02em; text-shadow: 0 2px 20px rgba(0,0,0,0.15); }
    .staff-hero-who { margin-top: 14px; font-size: 0.95rem; font-weight: 600; opacity: 0.92; }
    .staff-hero-who span { font-weight: 400; opacity: 0.7; }

    .staff-totals { display: flex; gap: 10px; margin-top: -14px; margin-bottom: 18px; position: relative; z-index: 2; }
    .staff-tot { flex: 1; background: #fff; border: 1px solid rgba(15,23,42,0.06); border-radius: var(--radius-lg); padding: 12px 14px; box-shadow: var(--shadow-md); text-align: center; }
    .staff-tot .v { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--slate-900); }
    .staff-tot .k { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--slate-400); margin-top: 3px; }

    .code-hero-icon { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(150deg, var(--link-color), var(--link-dark)); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 8px 20px -6px rgba(42,122,53,0.45); color: #fff; }
    .code-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; text-align: center; color: var(--slate-900); margin-bottom: 4px; }
    .code-sub { font-size: 0.84rem; color: var(--slate-400); text-align: center; margin-bottom: 20px; }
    .code-input {
        width: 100%; padding: 14px; border: 1.5px solid var(--slate-200); border-radius: var(--radius-md);
        font-family: var(--font-body); font-size: 1.3rem; font-weight: 700; letter-spacing: 0.18em; text-align: center;
        text-transform: uppercase; outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease; color: var(--slate-900);
    }
    .code-input:focus { border-color: var(--link-color); box-shadow: 0 0 0 3px rgba(42,122,53,0.1); }
    .code-msg { font-size: 0.8rem; color: var(--red-500); text-align: center; min-height: 18px; margin-top: 10px; }

    .staff-tip-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--slate-100); }
    .staff-tip-row:last-child { border-bottom: none; }
    .staff-tip-from { font-size: 0.85rem; font-weight: 600; color: var(--slate-800); }
    .staff-tip-when { font-size: 0.72rem; color: var(--slate-400); margin-top: 1px; }
    .staff-tip-amt { font-family: var(--font-display); font-weight: 700; color: var(--link-color); font-size: 0.98rem; }

    .staff-note { font-size: 0.76rem; color: var(--slate-400); text-align: center; line-height: 1.6; margin-top: 18px; }
</style>
</head>
<body>
<div class="staff-wrap">
    <div class="staff-topbar">
        <img src="Link_clean.png" alt="">
        <span>My Tips</span>
    </div>

    <!-- Code entry -->
    <div class="lk-card" id="codeCard" style="padding: 30px 26px;">
        <div class="code-hero-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><line x1="12" y1="6" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="18"/></svg>
        </div>
        <div class="code-title">Check your tips</div>
        <div class="code-sub">Camp families' tips go straight into your account. Enter the access code the camp office gave you.</div>
        <input class="code-input" id="staffCode" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off"
               oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')"
               onkeydown="if(event.key==='Enter')loadAccount()">
        <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:14px; padding:12px;" onclick="loadAccount()">View My Tips</button>
        <div class="code-msg" id="codeMsg"></div>
    </div>

    <!-- Account view -->
    <div id="accountView" style="display:none;">
        <div class="lk-hero staff-hero">
            <div class="lk-hero-left" style="position:relative; z-index:1; width:100%;">
                <div class="staff-hero-label">Current balance</div>
                <div class="staff-hero-amt" id="staffBalance">$0.00</div>
                <div class="staff-hero-who">You're <span id="staffWho"></span></div>
            </div>
        </div>
        <div class="staff-totals">
            <div class="staff-tot"><div class="v" id="staffEarned">$0.00</div><div class="k">Total Earned</div></div>
            <div class="staff-tot"><div class="v" id="staffPaid">$0.00</div><div class="k">Paid Out</div></div>
        </div>
        <div class="lk-card">
            <div class="lk-card-head"><h2>Recent Tips</h2></div>
            <div id="staffTips"></div>
        </div>
        <p class="staff-note">Balances update the moment a family sends a tip.<br>Questions about payout? Ask the camp office.</p>
        <button class="btn btn-ghost btn-sm" style="width:100%; justify-content:center; margin-top:14px;" onclick="switchCode()">Use a different code</button>
    </div>
</div>

<script src="supabase-js@2.js"></script>
<script src="config.js"></script>
<script>
(function() {
    'use strict';
    var CODE_KEY = 'campistry_link_staff_code';
    var db = null;
    var cfg = window.__CAMPISTRY_SUPABASE__;
    if (cfg && typeof supabase !== 'undefined' && supabase.createClient) {
        db = supabase.createClient(cfg.url, cfg.anonKey);
    }

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }
    function money(v) { return '$' + (parseFloat(v) || 0).toFixed(2); }
    function setMsg(m) { document.getElementById('codeMsg').textContent = m || ''; }

    window.loadAccount = function(codeArg) {
        var code = (codeArg || document.getElementById('staffCode').value || '').trim().toUpperCase();
        if (!code) { setMsg('Enter your access code.'); return; }
        if (!db) { setMsg('Connection not configured — contact the camp office.'); return; }
        setMsg('Checking…');
        db.rpc('get_staff_tip_account', { p_code: code }).then(function(res) {
            if (res.error) {
                var m = res.error.message || '';
                setMsg(m.indexOf('does not exist') >= 0
                    ? 'Tips accounts are not set up yet — the camp admin needs to run migration 017.'
                    : 'Error: ' + m);
                return;
            }
            if (!res.data || !res.data.success) {
                setMsg((res.data || {}).error === 'invalid_code'
                    ? 'That code doesn’t match an account. Double-check it with the camp office.'
                    : 'Could not load your account.');
                return;
            }
            setMsg('');
            try { localStorage.setItem(CODE_KEY, code); } catch(e) {}
            render(res.data);
        });
    };

    function render(d) {
        document.getElementById('codeCard').style.display = 'none';
        document.getElementById('accountView').style.display = '';
        document.getElementById('staffWho').innerHTML = esc(d.staff_name) + (d.role ? ' <span>· ' + esc(d.role) + '</span>' : '');
        document.getElementById('staffBalance').textContent = money(d.balance);
        document.getElementById('staffEarned').textContent = money(d.total_earned);
        document.getElementById('staffPaid').textContent = money(d.total_paid_out);
        var tips = d.recent_tips || [];
        var el = document.getElementById('staffTips');
        if (!tips.length) {
            el.innerHTML = '<div class="lk-empty" style="padding:20px 0;"><h3>No tips yet</h3><p>They’ll show up here the moment a family sends one.</p></div>';
            return;
        }
        el.innerHTML = tips.map(function(t) {
            var when = t.created_at ? new Date(t.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
            var fromWho = '';
            if (t.camper_name) {
                var parts = String(t.camper_name).split(' ');
                fromWho = parts[0] + (parts[1] ? ' ' + parts[1][0] + '.' : '') + '’s family';
            } else {
                fromWho = 'A camp family';
            }
            return '<div class="staff-tip-row"><div><div class="staff-tip-from">' + esc(fromWho) + '</div><div class="staff-tip-when">' + esc(when) + '</div></div>' +
                '<div class="staff-tip-amt">+' + money(t.amount) + '</div></div>';
        }).join('');
    }

    window.switchCode = function() {
        try { localStorage.removeItem(CODE_KEY); } catch(e) {}
        document.getElementById('accountView').style.display = 'none';
        document.getElementById('codeCard').style.display = '';
        document.getElementById('staffCode').value = '';
        document.getElementById('staffCode').focus();
    };

    // Auto-load: ?code=XXXX-XXXX in the URL, or a remembered code
    var urlCode = new URLSearchParams(window.location.search).get('code');
    var saved = null;
    try { saved = localStorage.getItem(CODE_KEY); } catch(e) {}
    if (urlCode) { document.getElementById('staffCode').value = urlCode.toUpperCase(); loadAccount(urlCode); }
    else if (saved) { document.getElementById('staffCode').value = saved; loadAccount(saved); }
})();
</script>
</body>
</html>

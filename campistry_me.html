<!DOCTYPE html>
<html lang="en" data-product="me">
<head>
    <meta charset="UTF-8">
    <title>Campistry Me | Camper Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Campistry_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="campistry-unified.css">
    <link rel="stylesheet" href="campistry_me.css">
</head>
<body>

<!-- HEADER (matches Flow) -->
<header class="app-header">
    <div class="header-left">
        <a href="dashboard.html" class="header-back">&larr; Dashboard</a>
        <button id="hamburgerBtn" class="hamburger-btn" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="app-title"><img src="Me_clean.png" alt="Campistry Me" class="app-logo-full app-logo-me-img"></div>
        <a href="flow.html" class="header-app-switch" title="Campistry Flow"><img src="Flow_clean.png" alt="Flow" class="app-logo-full app-logo-flow-img"></a>
        <a href="campistry_go.html" class="header-app-switch" title="Campistry Go"><img src="Go_clean.png" alt="Go" class="app-logo-full app-logo-go-img"></a>
    </div>
    <div class="header-right">
        <div class="me-search-wrap">
            <svg class="me-search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="globalSearch" class="me-search-input" placeholder="Search...">
        </div>
        <div class="sync-badge"><div class="sync-dot"></div><span>Synced</span></div>
    </div>
</header>

<!-- SIDEBAR (hidden, hamburger toggle) -->
<div id="sidebarBackdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar">
    <nav class="sidebar-nav">
        <div class="sidebar-label">People</div>
        <button class="sidebar-item active" data-page="campers"><span class="sidebar-dot"></span> Campers</button>
        <button class="sidebar-item" data-page="structure"><span class="sidebar-dot"></span> Camp Structure</button>
        <button class="sidebar-item" data-page="families"><span class="sidebar-dot"></span> Families</button>
        <button class="sidebar-item" data-page="bunkbuilder"><span class="sidebar-dot"></span> Bunk Builder</button>
        <div class="sidebar-label" style="margin-top:12px">Operations</div>
        <button class="sidebar-item" data-page="enrollment"><span class="sidebar-dot"></span> Registration</button>
        <button class="sidebar-item" data-page="billing"><span class="sidebar-dot"></span> Billing</button>
        <div class="sidebar-label" style="margin-top:12px">Communication</div>
        <button class="sidebar-item" data-page="broadcasts"><span class="sidebar-dot"></span> Broadcasts</button>
        <button class="sidebar-item" data-page="forms"><span class="sidebar-dot"></span> Forms & Docs</button>
        <div class="sidebar-label" style="margin-top:12px">Insights</div>
        <button class="sidebar-item" data-page="analytics"><span class="sidebar-dot"></span> Analytics & Finance</button>
        <button class="sidebar-item" data-page="reports"><span class="sidebar-dot"></span> Reports</button>
        <button class="sidebar-item" data-page="settings"><span class="sidebar-dot"></span> Settings</button>
    </nav>
</aside>

<!-- MAIN CONTENT -->
<div class="app-main"><main class="app-content" id="meContent">
    <div id="page-families" class="me-page"></div>
    <div id="page-campers" class="me-page active"></div>
    <div id="page-structure" class="me-page"></div>
    <div id="page-bunkbuilder" class="me-page"></div>
    <div id="page-enrollment" class="me-page"></div>
    <div id="page-billing" class="me-page"></div>
    <div id="page-broadcasts" class="me-page"></div>
    <div id="page-forms" class="me-page"></div>
    <div id="page-analytics" class="me-page"></div>
    <div id="page-reports" class="me-page"></div>
    <div id="page-settings" class="me-page"></div>
</main></div>

<!-- CAMPER VIEW -->
<div id="camperViewModal" class="me-overlay" style="display:none"><div class="me-modal me-modal--lg">
    <div class="me-modal-header" id="cvHead"></div>
    <div class="me-modal-body me-scroll" id="cvBody"></div>
    <div class="me-modal-footer"><button class="me-btn me-btn--sec" onclick="CampistryMe.closeModal('camperViewModal')">Close</button><button class="me-btn me-btn--pri" id="cvEditBtn">Edit Camper</button></div>
</div></div>

<!-- CAMPER EDIT -->
<div id="camperEditModal" class="me-overlay" style="display:none"><div class="me-modal me-modal--lg">
    <div class="me-modal-header"><h3 id="ceTitle">Add Camper</h3><button class="me-modal-x" onclick="CampistryMe.closeModal('camperEditModal')">&times;</button></div>
    <div class="me-modal-body me-scroll" id="ceBody"></div>
    <div class="me-modal-footer"><button class="me-btn me-btn--sec" onclick="CampistryMe.closeModal('camperEditModal')">Cancel</button><button class="me-btn me-btn--pri" id="ceSave">Save Camper</button></div>
</div></div>

<!-- FAMILY EDIT -->
<div id="familyModal" class="me-overlay" style="display:none"><div class="me-modal me-modal--lg">
    <div class="me-modal-header"><h3 id="fmTitle">Add Family</h3><button class="me-modal-x" onclick="CampistryMe.closeModal('familyModal')">&times;</button></div>
    <div class="me-modal-body me-scroll" id="fmBody"></div>
    <div class="me-modal-footer"><button class="me-btn me-btn--sec" onclick="CampistryMe.closeModal('familyModal')">Cancel</button><button class="me-btn me-btn--pri" id="fmSave">Save Family</button></div>
</div></div>

<!-- DIVISION EDIT -->
<div id="divModal" class="me-overlay" style="display:none"><div class="me-modal">
    <div class="me-modal-header"><h3 id="dmTitle">Add Division</h3><button class="me-modal-x" onclick="CampistryMe.closeModal('divModal')">&times;</button></div>
    <div class="me-modal-body" id="dmBody"></div>
    <div class="me-modal-footer"><button class="me-btn me-btn--sec" onclick="CampistryMe.closeModal('divModal')">Cancel</button><button class="me-btn me-btn--pri" id="dmSave">Save</button></div>
</div></div>

<!-- FORM CUSTOMIZER -->
<div id="formConfigModal" class="me-overlay" style="display:none"><div class="me-modal me-modal--lg">
    <div class="me-modal-header"><h3>Customize Registration Form</h3><button class="me-modal-x" onclick="CampistryMe.closeModal('formConfigModal')">&times;</button></div>
    <div class="me-modal-body me-scroll" id="fcBody"></div>
    <div class="me-modal-footer"><button class="me-btn me-btn--sec" onclick="CampistryMe.closeModal('formConfigModal')">Cancel</button><button class="me-btn me-btn--pri" onclick="CampistryMe.saveFormConfig()">Save Configuration</button></div>
</div></div>

<!-- APPLICATION REVIEW -->
<div id="appViewModal" class="me-overlay" style="display:none"><div class="me-modal me-modal--lg">
    <div class="me-modal-header" id="avHead"></div>
    <div class="me-modal-body me-scroll" id="avBody"></div>
    <div class="me-modal-footer" id="avFooter"></div>
</div></div>

<!-- CSV IMPORT -->
<div id="csvModal" class="me-overlay" style="display:none"><div class="me-modal">
    <div class="me-modal-header"><h3>Import CSV</h3><button class="me-modal-x" onclick="CampistryMe.closeModal('csvModal')">&times;</button></div>
    <div class="me-modal-body">
        <div class="me-dropzone" id="csvDZ" tabindex="0"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 5 17 10"/><line x1="12" y1="5" x2="12" y2="15"/></svg><p>Drop CSV or click to browse</p><small>Name, Division, Grade, Bunk, Team</small></div>
        <input type="file" id="csvFI" accept=".csv,.txt" style="display:none"><div id="csvPV" style="display:none"></div>
    </div>
    <div class="me-modal-footer"><button class="me-btn me-btn--sec" onclick="CampistryMe.closeModal('csvModal')">Cancel</button><button class="me-btn me-btn--pri" id="csvBtn" disabled>Import</button></div>
</div></div>

<div id="meToast" class="me-toast"><span id="tI">✓</span> <span id="tM">Done</span></div>

<script src="offline_data.js" onerror=""></script>
<script src="demo_mode.js"></script>
<script src="config.js"></script>
<script>if(window.location.protocol==='file:')document.write('<script src="supabase-js-local.js"><\/script>');else document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>');</script>
<script src="supabase_client.js"></script>
<script src="campistry_security.js"></script>
<script src="campistry_me.js"></script>
<script src="trial_guard.js"></script>
</body>
</html>

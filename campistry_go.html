<!DOCTYPE html>
<html lang="en" data-product="go">
<head>
    <meta charset="UTF-8" />
    <title>Campistry Go | Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="Campistry_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .cs-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
            padding: 56px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }

        .cs-logo {
            width: 72px;
            height: auto;
            opacity: 0.85;
        }

        .cs-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff7ed;
            color: #ea580c;
            border: 1.5px solid #fed7aa;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 14px;
        }

        .cs-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ea580c;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.75); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
        }

        .cs-sub {
            font-size: 1rem;
            color: #64748b;
            line-height: 1.6;
            font-weight: 400;
        }

        .cs-divider {
            width: 40px;
            height: 3px;
            border-radius: 99px;
            background: linear-gradient(90deg, #f97316, #fb923c);
        }

        .cs-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            padding: 10px 22px;
            border-radius: 10px;
            background: #f1f5f9;
            color: #475569;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }

        .cs-back:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .cs-back svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="cs-card">
        <img src="Go_clean.png" alt="Campistry Go" class="cs-logo">
        <div class="cs-badge">Coming Soon</div>
        <h1>Campistry Go</h1>
        <div class="cs-divider"></div>
        <p class="cs-sub">Bus routing &amp; transportation management is on its way.<br>Check back soon!</p>
        <a href="dashboard.html" class="cs-back">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 12L6 8l4-4"/>
            </svg>
            Back to Dashboard
        </a>
    </div>
</body>
</html>

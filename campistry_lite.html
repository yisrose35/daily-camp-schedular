<!DOCTYPE html>
<html lang="en" data-product="lite">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Campistry Lite</title>
    <link rel="icon" type="image/png" href="Campistry_logo.png">

    <!-- PWA / add-to-home-screen -->
    <link rel="manifest" href="manifest_lite.webmanifest">
    <meta name="theme-color" content="#EE6A53">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Campistry">
    <link rel="apple-touch-icon" href="Campistry_logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">

    <!-- FOUC prevention (same pattern as index/dashboard) -->
    <style>html:not(.css-ready) body { opacity: 0; } html.css-ready body { transition: opacity 0.15s ease; }</style>
    <link rel="stylesheet" href="campistry-unified.css">
    <link rel="stylesheet" href="campistry_lite.css" onload="document.documentElement.classList.add('css-ready')">
    <noscript><style>html body { opacity: 1 !important; }</style></noscript>
</head>
<body>

    <!-- Boot / auth splash -->
    <div id="liteSplash" class="lite-splash">
        <div class="lite-splash-mark">
            <img src="Campistry_clean.png" alt="Campistry">
        </div>
        <div class="lite-splash-title">Campistry <span>Lite</span></div>
        <div class="lite-splash-spinner"></div>
        <div class="lite-splash-status" id="liteSplashStatus">Signing you in&hellip;</div>
    </div>

    <!-- App shell (hidden until authenticated + hydrated) -->
    <div id="liteApp" class="lite-app" data-screen="home" style="display:none;">

        <header class="lite-header" id="liteHeader">
            <button class="lite-back" id="liteBackBtn" aria-label="Back to home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="lite-header-titles">
                <div class="lite-header-title" id="liteHeaderTitle">Campistry <span>Lite</span></div>
                <div class="lite-header-sub" id="liteHeaderSub"></div>
            </div>
            <button class="lite-avatar" id="liteMenuBtn" aria-label="Account menu"><span id="liteAvatarInitials">·</span></button>
        </header>

        <!-- Overflow menu -->
        <div class="lite-menu" id="liteMenu" style="display:none;">
            <div class="lite-menu-head">
                <div class="lite-menu-avatar" id="liteMenuAvatar">·</div>
                <div class="lite-menu-id">
                    <div class="lite-menu-user" id="liteMenuUser"></div>
                    <div class="lite-menu-role"><span class="lite-role-badge" id="liteRoleBadge"></span></div>
                </div>
            </div>
            <a href="dashboard.html" class="lite-menu-item" id="liteMenuDashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
                Open full Campistry
            </a>
            <button class="lite-menu-item lite-menu-danger" id="liteSignOut">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign out
            </button>
        </div>

        <main class="lite-main" id="liteMain">
            <!-- Home launcher -->
            <section class="lite-view lite-home" id="view-home"></section>
            <!-- App views -->
            <section class="lite-view" id="view-today" style="display:none;"></section>
            <section class="lite-view" id="view-locate" style="display:none;"></section>
            <section class="lite-view" id="view-reports" style="display:none;"></section>
            <section class="lite-view" id="view-roster" style="display:none;"></section>
            <section class="lite-view" id="view-meRoster" style="display:none;"></section>
            <section class="lite-view" id="view-meMedical" style="display:none;"></section>
            <section class="lite-view" id="view-meStaff" style="display:none;"></section>
            <section class="lite-view" id="view-liveRoll" style="display:none;"></section>
            <section class="lite-view" id="view-liveChanges" style="display:none;"></section>
            <section class="lite-view" id="view-healthMeds" style="display:none;"></section>
            <section class="lite-view" id="view-healthRoster" style="display:none;"></section>
            <section class="lite-view" id="view-healthTrip" style="display:none;"></section>
            <section class="lite-view" id="view-linkMessages" style="display:none;"></section>
            <section class="lite-view" id="view-linkCompose" style="display:none;"></section>
            <section class="lite-view" id="view-league" style="display:none;"></section>
            <section class="lite-view" id="view-staff" style="display:none;"></section>
            <section class="lite-view" id="view-messaging" style="display:none;"></section>
        </main>

        <nav class="lite-tabbar" id="liteTabbar">
            <!-- Tabs injected by campistry_lite.js when an app is open -->
        </nav>
    </div>

    <!-- Toast -->
    <div class="lite-toast" id="liteToast" style="display:none;"></div>

    <!-- ===== Core stack (order matters: config → SDK → client → RBAC → data) ===== -->
    <script src="config.js"></script>
    <script>
        // Non-blocking SDK loader (same pattern as flow.html): load the Supabase
        // SDK, then supabase_client.js in its onload so init order is guaranteed.
        (function () {
            var s = document.createElement('script');
            s.src = (window.location.protocol === 'file:')
                ? 'supabase-js-local.js'
                : 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            s.onload = function () {
                var chain = [
                    'supabase_client.js',
                    'access_control.js',
                    'supabase_permissions.js',
                    'supabase_schedules.js',
                    'division_times_system.js',
                    'rotation_cloud.js',
                    'campistry_lite.js'
                ];
                (function next(i) {
                    if (i >= chain.length) return;
                    var t = document.createElement('script');
                    t.src = chain[i];
                    t.onload = function () { next(i + 1); };
                    t.onerror = function () {
                        console.error('[Lite] Failed to load ' + chain[i]);
                        next(i + 1);
                    };
                    document.body.appendChild(t);
                })(0);
            };
            s.onerror = function () {
                var el = document.getElementById('liteSplashStatus');
                if (el) el.textContent = 'Could not reach the network. Check your connection and reload.';
            };
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
